<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>artlu.ai — the list</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html[data-theme="dark"] {
    --bg:#08090a; --surface:#0e0f11; --surface-2:#16191d;
    --border:#1a1d22; --border-strong:#2b3038; --border-hover:#4a525e;
    --text:#c0c4cc; --text-bright:#f0f1f3; --text-sub:#9aa0aa;
    --dim:#6b7280; --dimmer:#3a3f48;
    --green:#4ade80; --green-bg:#062b12; --green-border:#1d4d31;
    --blue:#60a5fa; --amber:#d8a657; --amber-bg:#1c1a12;
    --node-shadow:0 8px 26px rgba(0,0,0,0.6);
    --font:'IBM Plex Mono','SF Mono',Consolas,monospace;
    --mono:'IBM Plex Mono','SF Mono',Consolas,monospace;
  }
  html[data-theme="light"] {
    --bg:#e9eaec; --surface:#ffffff; --surface-2:#f2f3f5;
    --border:#dcdfe2; --border-strong:#b7bcc3; --border-hover:#9ba0a8;
    --text:#34373c; --text-bright:#15171a; --text-sub:#50545a;
    --dim:#676c74; --dimmer:#9298a0;
    --green:#0a7d5e; --green-bg:#e6f4ee; --green-border:#a9ddc9;
    --blue:#2563eb; --amber:#8a6300; --amber-bg:#f3e9d2;
    --node-shadow:0 1px 2px rgba(22,24,27,0.07), 0 4px 14px rgba(22,24,27,0.06);
    --font:'Inter',system-ui,sans-serif;
    --mono:'IBM Plex Mono','SF Mono',Consolas,monospace;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html { height:100%; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); font-size:14px;
    -webkit-font-smoothing:antialiased; min-height:100%; }

  /* ---------- header — shared with map / stack ---------- */
  .topbar { height:72px; border-bottom:1px solid transparent; background:var(--bg);
    display:flex; align-items:center; gap:24px; padding:0 18px; position:sticky; top:0; z-index:40;
    transition:background .16s, border-color .16s, box-shadow .16s; }
  .topbar.stuck { background:var(--surface); border-bottom-color:var(--border); box-shadow:var(--node-shadow); }
  .brandwrap { display:flex; align-items:center; gap:18px; }
  .identity { display:flex; flex-direction:column; gap:3px; }
  .htitle { font-size:13px; font-weight:600; color:var(--text-bright); white-space:nowrap; }
  .hbio { font-size:11.5px; color:var(--text-sub); white-space:nowrap; }
  .hright { margin-left:auto; display:flex; align-items:center; gap:14px; }
  .brand { font-weight:600; font-size:29px; letter-spacing:-0.02em; color:var(--text-bright); display:flex; align-items:center; gap:3px; }
  .cursor-bl { width:10px; height:26px; background:var(--green); display:inline-block; animation:blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity:0; } }
  .seg { display:flex; border:1px solid var(--border); border-radius:4px; overflow:hidden; }
  .seg button { font-family:var(--mono); font-size:12px; background:transparent; color:var(--dim); border:none; padding:6px 15px; cursor:pointer; }
  .seg button.on { background:var(--green-bg); color:var(--green); }
  .seg .seg-theme { padding:6px 11px; font-size:13px; border-left:1px solid var(--border); }
  .navgroup { display:flex; align-items:center; gap:8px; margin-left:22px; }
  .theme-tog { width:30px; height:28px; border:1px solid var(--border); background:transparent; color:var(--text-sub); border-radius:5px; cursor:pointer; font-size:13px; }

  .progress { display:flex; flex-direction:column; align-items:flex-start; gap:5px; }
  .pcount { font-family:var(--mono); font-size:11.5px; color:var(--text-sub); white-space:nowrap; }
  .pcount b { color:var(--text-bright); }
  .pstrip { display:flex; gap:3px; }
  .pcell { width:9px; height:9px; border-radius:2px; background:var(--border); position:relative; }
  .pcell:hover { outline:1.5px solid var(--text-sub); outline-offset:1px; }
  .pcell:hover::after { content:attr(data-tip); position:absolute; top:17px; left:50%; transform:translateX(-50%);
    background:var(--surface-2); border:1px solid var(--border-strong); border-radius:5px; padding:5px 9px;
    font-size:11px; color:var(--text-bright); white-space:nowrap; z-index:60; box-shadow:var(--node-shadow); pointer-events:none; }

  /* ---------- page — centered ---------- */
  .page { padding:16px 30px 110px; }
  .col { max-width:1240px; margin:0 auto; }
  .sec-h { font-size:11px; letter-spacing:1.8px; text-transform:uppercase; color:var(--dim);
    margin:0 0 14px; display:flex; align-items:center; gap:9px; }
  .sec-h.mt { margin-top:20px; }
  .sec-h::after { content:''; flex:1; height:1px; background:var(--border); }

  /* ---------- major projects — horizontal scroll, side arrows ---------- */
  .strip-wrap { position:relative; }
  .proj-strip { display:flex; gap:16px; overflow-x:auto; padding:3px;
    scroll-behavior:smooth; scrollbar-width:none; }
  .proj-strip::-webkit-scrollbar { display:none; }
  .strip-fade { position:absolute; top:3px; bottom:9px; width:54px; z-index:4; pointer-events:none;
    transition:opacity .18s; }
  .strip-fade.l { left:0; background:linear-gradient(to right,var(--bg),transparent); }
  .strip-fade.r { right:0; background:linear-gradient(to left,var(--bg),transparent); }
  /* scroll buttons sit OUTSIDE the strip, in the page margin */
  .strip-btn { position:absolute; top:50%; transform:translateY(-50%); z-index:6;
    font-family:var(--mono); font-size:10px; letter-spacing:1px; text-transform:uppercase;
    background:transparent; border:none; box-shadow:none;
    color:var(--dim); cursor:pointer; padding:9px 8px; white-space:nowrap; transition:color .12s; }
  .strip-btn:hover { color:var(--text-bright); }
  .strip-btn.l { right:100%; margin-right:10px; display:none; }
  .strip-btn.l.show { display:block; }
  .strip-btn.r { left:100%; margin-left:10px; }
  .strip-btn.r.off { display:none; }
  .pmod { flex:0 0 322px; border:1px solid var(--border-strong);
    border-radius:11px; overflow:hidden; background:var(--surface); box-shadow:var(--node-shadow);
    cursor:pointer; transition:border-color .14s, transform .14s, box-shadow .14s; }
  .pmod:hover { border-color:var(--border-hover); transform:translateY(-2px); }
  .pmod.active { border-color:var(--green-border); box-shadow:0 0 0 2px var(--green-border), var(--node-shadow); }
  .pvis { height:150px; position:relative; background:#000; border-bottom:1px solid var(--border); overflow:hidden; }
  .pvis .thumb { width:100%; height:100%; background-size:cover; background-position:center; }
  .pvis iframe { position:absolute; top:0; left:0; border:0; pointer-events:none; }
  .pname-tag { position:absolute; top:9px; left:9px; font-family:var(--mono); font-size:11px;
    background:rgba(0,0,0,0.6); color:#fff; padding:3px 8px; border-radius:4px; }
  .plogo { height:150px; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:11px;
    border-bottom:1px solid var(--border); background:linear-gradient(150deg,var(--green-bg),var(--surface-2)); }
  .plogo img { width:66px; height:66px; border-radius:15px; object-fit:contain; }
  .plogo .pw { font-family:var(--mono); font-size:23px; font-weight:600; letter-spacing:-0.01em; color:var(--text-bright); }
  .pvis-links { position:absolute; top:9px; right:9px; display:flex; gap:6px; z-index:3; }
  .plink { font-family:var(--mono); font-size:9.5px; letter-spacing:0.5px; text-transform:uppercase;
    background:rgba(0,0,0,0.62); color:#fff; padding:4px 8px; border-radius:4px; text-decoration:none; white-space:nowrap; }
  .plink:hover { background:rgba(0,0,0,0.85); }
  .proj-mark { position:absolute; inset:0; margin:auto; width:fit-content; height:fit-content;
    display:flex; align-items:center; gap:5px; background:var(--surface);
    border-radius:10px; padding:13px 20px; box-shadow:var(--node-shadow); }
  .pm-name { font-family:var(--mono); font-size:21px; font-weight:600; letter-spacing:-0.01em; color:var(--text-bright); }
  .pm-cursor { width:8px; height:20px; background:var(--green); display:inline-block; animation:blink 1s step-end infinite; }
  .pmod-body { padding:11px 14px 13px; }
  .pmod-desc { font-size:12px; color:var(--text-sub); line-height:1.58;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .pmod-meta { margin-top:8px; font-size:10.5px; letter-spacing:0.5px; color:var(--dim); }

  /* ---------- timeline — left date spectrum + rows ---------- */
  .filterbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .filter-l { font-size:11px; letter-spacing:1.2px; text-transform:uppercase; color:var(--dim); margin-right:2px; }
  .fchip { font-family:var(--mono); font-size:11.5px; background:transparent; color:var(--text-sub);
    border:1px solid var(--border); border-radius:20px; padding:5px 13px; cursor:pointer; transition:all .12s; }
  .fchip:hover { border-color:var(--border-hover); }
  .fchip.on { background:var(--green-bg); color:var(--green); border-color:var(--green-border); }
  .fcount { margin-left:auto; font-size:11.5px; color:var(--dim); font-family:var(--mono); }

  /* date spectrum — vertical spine + date pills, copied from the map view */
  .tl { position:relative; }
  .tl::before { content:''; position:absolute; left:66px; top:6px; bottom:6px;
    width:1px; background:var(--border-strong); }
  .day-pill-row { height:40px; position:relative; }
  .day-pill { position:absolute; left:66px; top:50%; transform:translate(-50%,-50%);
    font-family:var(--mono); font-size:11px; font-weight:500; color:var(--text-sub);
    background:var(--bg); border:1px solid var(--border-strong); border-radius:5px;
    padding:3px 9px; white-space:nowrap; z-index:2; }
  .day-rows { margin-left:106px; }

  .item { border-bottom:1px solid var(--border); }
  .day-group:last-child .day-rows .item:last-child { border-bottom:none; }
  .r { display:flex; align-items:flex-start; gap:11px; padding:7px 14px 8px; cursor:pointer;
    transition:background .1s; }
  .r:hover { background:var(--surface-2); }
  .item.open .r { background:var(--surface-2); }
  .caret { font-size:8px; color:var(--dimmer); transition:transform .14s; flex-shrink:0; width:8px; margin-top:4px; }
  .item.open .caret { transform:rotate(90deg); }
  .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:5px; }
  .dot.video { background:var(--blue); } .dot.build { background:var(--green); }
  .r-col { flex:1; min-width:0; display:flex; flex-direction:column; gap:3px; }
  .r-title { color:var(--text-bright); font-weight:500; font-size:13px; line-height:1.4;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .r-sub { font-size:11.5px; color:var(--text-sub); line-height:1.4;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  /* aligned right-side columns — stack · status · marker */
  .r-stack { width:248px; flex-shrink:0; font-size:10.5px; color:var(--dim); line-height:1.45; padding-top:3px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .r-status { width:74px; flex-shrink:0; padding-top:1px; }
  .new-tag { font-size:9.5px; color:var(--green); border:1px solid var(--green-border);
    background:var(--green-bg); border-radius:3px; padding:0 5px; }
  .status { font-size:10px; padding:1px 6px; border-radius:3px; background:var(--green-bg); color:var(--green); }
  .r-mic { width:14px; text-align:center; font-size:9px; color:var(--dim); flex-shrink:0; padding-top:3px; }

  /* ---------- expandable detail ---------- */
  .detail { display:none; padding:4px 22px 20px 25px; background:var(--surface-2);
    border-top:1px solid var(--border); }
  .item.open .detail { display:block; }
  .d-long { padding-top:14px; max-width:680px; }
  .d-long p { font-size:13px; color:var(--text); line-height:1.68; margin-bottom:11px; }
  .d-long p:last-child { margin-bottom:0; }
  .d-long strong { color:var(--text-bright); font-weight:600; }
  .d-long em { color:var(--text-bright); font-style:italic; }
  .d-long a { color:var(--green); text-decoration:none; }
  .d-long a:hover { text-decoration:underline; }
  .d-long code { font-family:var(--mono); font-size:0.9em; background:var(--surface);
    border:1px solid var(--border); border-radius:3px; padding:0 4px; }
  .d-long ul { margin:0 0 11px 4px; list-style:none; }
  .d-long li { font-size:12.5px; color:var(--text-sub); line-height:1.6; padding-left:14px; position:relative; }
  .d-long li::before { content:'·'; position:absolute; left:2px; color:var(--dim); }
  .d-embed { margin-top:15px; border:1px solid var(--border-strong); border-radius:8px;
    overflow:hidden; background:#000; box-shadow:var(--node-shadow); }
  .d-embed.h { aspect-ratio:16/9; max-width:440px; }
  .d-embed.v { width:248px; height:440px; }
  .d-embed.d { width:340px; height:468px; background:var(--surface-2); }
  .d-embed iframe { width:100%; height:100%; border:0; display:block; }
  .d-sec { margin-top:17px; }
  .d-sec h4 { font-size:10px; letter-spacing:1.4px; text-transform:uppercase; color:var(--dim); margin-bottom:8px; }
  .d-chips { display:flex; flex-wrap:wrap; gap:5px; }
  .chip { font-size:11px; color:var(--text-sub); background:var(--surface); border:1px solid var(--border); border-radius:3px; padding:2px 7px; }
  .d-journal { margin-top:17px; border-left:2px solid var(--amber); background:var(--amber-bg);
    border-radius:0 6px 6px 0; padding:11px 14px; max-width:680px; }
  .dj-h { font-size:10px; letter-spacing:1.3px; text-transform:uppercase; color:var(--amber); margin-bottom:5px; }
  .dj-title { font-size:12.5px; font-weight:600; color:var(--text-bright); margin-bottom:5px; }
  .dj-body { font-size:12px; color:var(--text-sub); line-height:1.62; }
  .dj-link { display:inline-block; margin-top:10px; font-size:11.5px; color:var(--amber); text-decoration:none; }
  .dj-link:hover { text-decoration:underline; }
  .d-foot { margin-top:17px; display:flex; align-items:center; gap:10px; font-size:12px; max-width:680px; }
  .d-lineage { color:var(--dim); } .d-lineage b { color:var(--text-sub); font-weight:500; }
  .d-lineage .sep { color:var(--dimmer); margin:0 5px; }
  .d-open { margin-left:auto; color:var(--green); text-decoration:none; font-weight:500; }
  .d-open:hover { text-decoration:underline; }
  .empty { padding:34px; text-align:center; color:var(--dim); font-size:12.5px; }

  /* ---------- mobile ---------- */
  @media (max-width:720px) {
    body { font-size:13px; }
    /* header collapses — identity + progress drop, nav wraps right */
    .topbar { height:auto; min-height:54px; gap:10px 14px; padding:9px 13px;
      flex-wrap:wrap; }
    .brandwrap { gap:12px; }
    .brand { font-size:22px; }
    .cursor-bl { width:7px; height:19px; }
    .identity { display:none; }
    .progress { display:none; }
    .hright { margin-left:auto; gap:10px; }
    .navgroup { margin-left:0; gap:6px; }
    .seg button { padding:6px 11px; font-size:11px; }
    .seg .seg-theme { padding:6px 9px; }
    /* page */
    .page { padding:12px 13px 88px; }
    .sec-h.mt { margin-top:16px; }
    /* projects strip — touch-scroll only, no outside buttons */
    .strip-btn { display:none !important; }
    .pmod { flex:0 0 286px; }
    .pvis, .plogo { height:132px; }
    /* timeline — tighten the date spine, drop the tech-stack column */
    .tl::before { left:40px; }
    .day-pill { left:40px; }
    .day-rows { margin-left:60px; }
    .r { gap:9px; padding:8px 4px 9px; }
    .r-stack { display:none; }
    .r-status { width:auto; }
    /* expandable detail */
    .detail { padding:4px 10px 18px 12px; }
    .d-long, .d-foot, .d-journal { max-width:100%; }
    .d-embed.h, .d-embed.d { width:100%; max-width:100%; }
    .d-foot { flex-wrap:wrap; }
  }
</style>
<script>try{var _t=localStorage.getItem('artlu-theme');if(_t)document.documentElement.dataset.theme=_t;}catch(e){}</script>
</head>
<body>

<div class="topbar" id="topbar">
  <div class="brandwrap">
    <div class="brand">artlu.ai<span class="cursor-bl"></span></div>
    <div class="identity">
      <div class="htitle">100 days. 100 features.</div>
      <div class="hbio">one person. no coding experience. just AI and an internet connection.</div>
    </div>

  <div class="hright">

    <div class="navgroup">

</div>

<div class="page">

    <h2 class="sec-h mt" id="tlHead">the timeline</h2>
    <div class="filterbar" id="filterbar"></div>
    <div id="feed"></div>
  </div>
</div>

    { id:'vibeskill', name:'VibeSkill', meta:'prototype · apr 2026', demo:'https://vsmockup-d.pages.dev/',

  const subgroups = {

                     vibeskill:'VibeSkill', costintel:'CostIntel', artlu:'artlu.ai' };

    { id:'cg', proj:'spoolcast', type:'research', mt:'d', demo:'https://artluai.github.io/context-gate-ai-hallucination/', new:true, date:'may 18', slug:'research/context-gate',
      name:'AI hallucination experiment — Context Gate',
      desc:"Tests whether forcing the source of truth into an AI's context reduces hallucination — interactive demo + report.",
      stack:['Python','vanilla HTML/CSS/JS'],
      long:`AI agents often hallucinate *before* they answer — they skip the file that holds the rule, then fill the blank with something plausible. This experiment tested a fix: a **Context Gate** that forces the source-of-truth file into the model's context before it acts.

Across three studies and two models, with no gate the model drifted on **90–100% of scenes** — and usually never opened the rule file at all. Forcing the rule in cut that to near zero on DeepSeek, and sharply reduced it on Opus.

**What it means**
Context Gates don't make a model hallucination-proof. They remove one specific, common cause: answering before the source of truth is in context.

**Read / try it**

    { id:'d6', sub:'devlog', type:'video', mt:'h', yt:'c1tWTNh2D1Y', date:'may 8', slug:'project/spoolcast-dev-log-6',

      long:`AI agents make things up about their own work — not because they're lying, but because they have nothing real to check.

  feed.addEventListener('click',e=>{
    const a=e.target.closest('a');
    if(a){ if((a.getAttribute('href')||'')==='#') e.preventDefault(); return; }
    const item=e.target.closest('.item[data-id]'); if(!item) return;
    const open=item.classList.toggle('open');
    if(open) item.querySelectorAll('iframe[data-src]').forEach(f=>{ if(!f.src) f.src=f.dataset.src; });
  });
  renderFilters(); renderFeed();

  /* ---- activity strip ---- */
  (function(){
    const act=[1,0,2,1,3,2,0,1,4,2,1,3,2,0,2,1,3,2,4,1];
    const h=document.getElementById('actStrip'); if(!h) return;
    const end=new Date(2026,4,18);
    act.forEach((lv,i)=>{
      const c=document.createElement('div'); c.className='pcell';
      const d=new Date(end); d.setDate(d.getDate()-7*(act.length-1-i));
      const lbl=d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
      c.dataset.tip='week of '+lbl+' · '+lv+' shipped';
      if(lv){ c.style.background='var(--green)'; c.style.opacity=(0.3+lv*0.17); }
      h.appendChild(c);
    });
  })();

  /* ---- frozen header on scroll ---- */
  const topbar=document.getElementById('topbar');
  function onScroll(){ topbar.classList.toggle('stuck',(window.scrollY||document.documentElement.scrollTop)>6); }
  window.addEventListener('scroll',onScroll,{passive:true}); onScroll();

  function toggleTheme(){ const h=document.documentElement; const t=h.dataset.theme==='light'?'dark':'light';
    h.dataset.theme=t; try{ localStorage.setItem('artlu-theme',t); }catch(e){} }
  window.toggleTheme=toggleTheme;
</script>
</body>
</html>
