[build]
  command = "npm run sync:data && npm run validate:stack && npm run build:strict"
  publish = "dist"

[[redirects]]
  from = "/journal"
  to = "/log"
  status = 301

[[redirects]]
  from = "/journal/*"
  to = "/log/:splat"
  status = 301

[[redirects]]
  from = "/dashboard"
  to = "/admin"
  status = 301
